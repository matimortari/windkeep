name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Sync secrets
        env:
          WINDKEEP_URL: ${{ secrets.WINDKEEP_URL }}
          WINDKEEP_PROJECT_ID: ${{ secrets.WINDKEEP_PROJECT_ID }}
          WINDKEEP_TOKEN: ${{ secrets.WINDKEEP_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          set -euo pipefail

          HTTP_CODE=$(curl -s -o /tmp/wk_response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${WINDKEEP_TOKEN}" \
            "${WINDKEEP_URL}/api/projects/${WINDKEEP_PROJECT_ID}/secrets")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "HTTP ${HTTP_CODE}:" && cat /tmp/wk_response.json
            exit 1
          fi

          RESPONSE=$(cat /tmp/wk_response.json)
          VARS_ARGS=()
          while IFS=$'\t' read -r KEY VALUE; do
            echo "::add-mask::${VALUE}"
            VARS_ARGS+=("${KEY}=${VALUE}")
          done < <(echo "$RESPONSE" | jq -r '
            .decryptedSecrets[] | . as $s | .values[] | [($s.key | ascii_upcase), .value] | @tsv
          ')

          if [ ${#VARS_ARGS[@]} -eq 0 ]; then
            echo "No secrets returned." && exit 1
          fi

          railway variables set "${VARS_ARGS[@]}" --service "$RAILWAY_SERVICE"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          railway up --detach --service "$RAILWAY_SERVICE"
